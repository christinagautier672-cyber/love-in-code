<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To My Favorite Human ❤️</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #020617;
      color: #f8fafc;
      line-height: 1.6;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(236,72,153,0.18), transparent 40%),
        radial-gradient(circle at bottom left, rgba(34,211,238,0.18), transparent 40%);
      pointer-events: none;
      z-index: -1;
    }
    .container {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
    }
    .card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(236,72,153,0.15);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 2rem 0;
    }
    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
      font-family: monospace;
      color: #94a3b8;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;n
    }
    .dot.red { background: #f87171; }
    .dot.yellow { background: #facc15; }
    .dot.green { background: #4ade80; }
    .terminal-text {
      font-family: monospace;
      color: #4ade80;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1.05;
      margin: 0 0 1rem;
    }
    .gradient {
      background: linear-gradient(90deg, #f472b6, #22d3ee);
</html>
