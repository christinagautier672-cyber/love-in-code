<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Love OS v3.0 ❤️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050816;
  color:white;
  overflow-x:hidden;
}

/* GLITCH */
.glitch {
  animation: glitch 0.4s infinite;
}
@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(-2px,2px); }
  50% { transform: translate(2px,-2px); }
  75% { transform: translate(-1px,1px); }
  100% { transform: translate(0); }
}

/* BACKGROUND */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(236,72,153,0.25), transparent 40%),
    radial-gradient(circle at bottom right, rgba(34,211,238,0.25), transparent 40%);
  z-index:-1;
}

/* CONTAINER */
.container {
  width:min(1000px,90%);
  margin:auto;
  padding:40px 0;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
  margin:15px 0;
  transition:0.3s;
  cursor:pointer;
}
.card:hover {
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(236,72,153,0.3);
}

/* BUTTON */
button {
  background:linear-gradient(90deg,#f472b6,#22d3ee);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* POPUP */
.popup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#0f172a;
  border:2px solid #f472b6;
  padding:20px;
  border-radius:15px;
  display:none;
  z-index:1000;
}

/* HEARTS */
.heart {
  position:fixed;
  color:pink;
  animation: float 6s linear forwards;
}
@keyframes float {
  from { transform:translateY(100vh); opacity:1; }
  to { transform:translateY(-10vh); opacity:0; }
}

/* SCREEN SHAKE */
.shake {
  animation: shake 0.3s;
}
@keyframes shake {
  0%{transform:translate(0);}
  25%{transform:translate(-5px,5px);}
  50%{transform:translate(5px,-5px);}
  75%{transform:translate(-5px,5px);}
  100%{transform:translate(0);}
}

/* LOCK SCREEN */
#lock {
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-family:monospace;
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f5b8a7.mp3" type="audio/mp3">
</audio>

<!-- LOCK -->
<div id="lock">
  <h2 class="glitch">LOVE SYSTEM LOCKED</h2>
  <p>Hint: our forever word ❤️</p>
  <input id="pass" placeholder="password"/>
  <br><br>
  <button onclick="unlock()">ENTER</button>
</div>

<!-- MAIN -->
<div id="site" style="display:none">

<div class="container">

<h1>To My Favorite Human ❤️</h1>

<div class="card" onclick="popup('You are my home.')">
💌 Click me
</div>

<div class="card" onclick="popup('I would choose you every timeline.')">
💖 Another secret
</div>

<div class="card">
<h2>🎉 Anniversary Countdown (Dating - 15th)</h2>
<p id="count1"></p>
</div>

<div class="card">
<h2>💍 Wedding Anniversary Countdown (April)</h2>
<p id="count2"></p>
</div>

<div class="card">
<h2>💻 Fake Hack</h2>
<button onclick="hack()">Run love.exe</button>
<p id="hack"></p>
</div>

<div class="card">
<h2>🎮 Choose Path</h2>
<button onclick="path('travel')">Travel</button>
<button onclick="path('home')">Home</button>
<button onclick="path('future')">Future</button>
<p id="path"></p>
</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<p id="text"></p>
<button onclick="closePopup()">Close</button>
</div>

<script>

/* UNLOCK */
function unlock(){
  const val=document.getElementById("pass").value.toLowerCase();

  if(val==="forever" || val==="love"){
    document.getElementById("lock").style.display="none";
    document.getElementById("site").style.display="block";
    document.getElementById("music").play();
    startCountdowns();
  } else {
    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),300);
    alert("wrong password ❤️ hint: forever word");
  }
}

/* POPUP */
function popup(t){
  document.getElementById("text").innerText=t;
  document.getElementById("popup").style.display="block";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* HEARTS */
document.addEventListener("click",(e)=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
});

/* FAKE HACK */
function hack(){
  const lines=[
    "scanning heart...",
    "bypassing logic...",
    "injecting love...",
    "ERROR: too much affection ❤️",
    "access granted: forever yours"
  ];
  let i=0;
  const el=document.getElementById("hack");
  el.innerText="";
  const int=setInterval(()=>{
    el.innerText+=lines[i]+"\n";
    i++;
    if(i>=lines.length)clearInterval(int);
  },600);
}

/* PATH */
function path(v){
  if(v==="travel")document.getElementById("path").innerText="we explore the world ✈️";
  if(v==="home")document.getElementById("path").innerText="we build a home 🏡";
  if(v==="future")document.getElementById("path").innerText="we grow old together ❤️";
}

/* COUNTDOWNS */
function startCountdowns(){

  function next15th(){
    const now=new Date();
    let month=now.getMonth();
    let year=now.getFullYear();

    let target=new Date(year,month,15);
    if(now>target) target=new Date(year,month+1,15);

    return target;
  }

  function wedding(){
    return new Date("2026-04-14");
  }

  setInterval(()=>{

    const now=new Date();

    let t1=next15th()-now;
    let d1=Math.floor(t1/(1000*60*60*24));

    document.getElementById("count1").innerText=
      d1+" days until our monthly 15th ❤️";

    let t2=wedding()-now;
    let d2=Math.floor(t2/(1000*60*60*24));

    document.getElementById("count2").innerText=
      d2+" days until wedding anniversary 💍";

  },1000);
}

</script>

</body>
</html>
