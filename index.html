<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Love OS ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
  background: black;
}

/* 🌌 ANIMATED BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0b1023, #111827);
  background-size: 400% 400%;
  animation: moveBG 12s ease infinite;
  z-index: -2;
}

@keyframes moveBG {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

/* subtle floating glow dots */
.dot {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(236,72,153,0.6);
  border-radius: 50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 🎬 VIDEO INTRO */
#introVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 9999;
}

/* LOCK SCREEN */
#lock {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9998;
  backdrop-filter: blur(10px);
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* 💎 MAIN LAYOUT */
.container {
  width: min(1000px, 90%);
  margin: auto;
  padding: 50px 0;
}

/* ✨ COOL CARDS */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  padding: 20px;
  margin: 15px 0;
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
}

/* shine effect */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: 0.5s;
}

.card:hover::before {
  left: 100%;
}

.card:hover {
  transform: scale(1.03) rotateX(3deg);
  box-shadow: 0 0 25px rgba(236,72,153,0.4);
}

/* BUTTONS */
button {
  background: linear-gradient(90deg, #f472b6, #22d3ee);
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0f172a;
  border: 2px solid #f472b6;
  padding: 20px;
  border-radius: 15px;
  display: none;
  z-index: 1000;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎬 VIDEO INTRO (replace link if you want custom video later) -->
<video id="introVideo" autoplay muted>
  <source src="https://cdn.coverr.co/videos/coverr-love-in-the-air-4302/1080p.mp4" type="video/mp4">
</video>

<!-- 🔐 LOCK -->
<div id="lock">
  <h2>💖 LOVE SYSTEM LOCKED</h2>
  <p>Hint: say it to unlock me</p>
  <input id="pass" placeholder="password"/>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- MAIN -->
<div id="site" style="display:none">

<div class="container">

<h1>To My Favorite Human ❤️</h1>

<div class="card" onclick="popup('You are my safest place.')">
💌 Click for a memory
</div>

<div class="card" onclick="popup('I choose you in every timeline.')">
💖 Another secret
</div>

<div class="card" onclick="popup('You + Me = Forever system.')">
💻 Love equation
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<p id="text"></p>
<button onclick="closePopup()">close</button>
</div>

<script>

/* VIDEO → SITE TRANSITION */
const vid = document.getElementById("introVideo");
vid.onended = () => {
  vid.style.display = "none";
  document.getElementById("lock").style.display = "flex";
};

/* PASSWORD */
function unlock(){
  const val = document.getElementById("pass").value.toLowerCase().trim();

  if(val === "i love you"){
    document.getElementById("lock").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    alert("try again ❤️ (hint: 3 words)");
  }
}

/* POPUP */
function popup(t){
  document.getElementById("text").innerText = t;
  document.getElementById("popup").style.display = "block";
}
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* FLOATING DOTS */
setInterval(() => {
  const d = document.createElement("div");
  d.className = "dot";
  d.style.left = Math.random()*100 + "vw";
  d.style.animationDuration = (5 + Math.random()*5) + "s";
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 10000);
}, 300);

</script>

</body>
</html>
