<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOVE OS: FINAL BOSS ❤️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050816;
  color:white;
  overflow-x:hidden;
  animation: heartbeat 6s infinite;
}

/* HEARTBEAT */
@keyframes heartbeat {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

/* GLITCH INTRO */
#intro {
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:monospace;
  z-index:9999;
}
.glitch {
  animation: glitch 0.3s infinite;
}
@keyframes glitch {
  0%{transform:translate(0);}
  25%{transform:translate(-2px,2px);}
  50%{transform:translate(2px,-2px);}
  75%{transform:translate(-1px,1px);}
  100%{transform:translate(0);}
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(236,72,153,0.25), transparent 40%),
    radial-gradient(circle at bottom right, rgba(34,211,238,0.25), transparent 40%);
  z-index:-1;
}

/* LAYOUT */
.container {
  width:min(1000px,90%);
  margin:auto;
  padding:40px 0;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
  margin:15px 0;
  transition:0.3s;
  cursor:pointer;
}
.card:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(236,72,153,0.3);
}

/* POPUP */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#0f172a;
  border:2px solid #f472b6;
  padding:20px;
  border-radius:15px;
  display:none;
  z-index:1000;
}

/* HEARTS */
.heart {
  position:fixed;
  color:pink;
  animation:float 6s linear forwards;
}
@keyframes float {
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}

/* SECRET ZONES */
.secret-zone {
  position:absolute;
  opacity:0;
  width:80px;
  height:80px;
}

/* GALLERY */
.gallery img {
  width:100%;
  border-radius:15px;
  margin:10px 0;
  cursor:pointer;
  transition:0.3s;
}
.gallery img:hover {
  transform:scale(1.03);
}

button{
  background:linear-gradient(90deg,#f472b6,#22d3ee);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="glitch">BOOTING LOVE OS...</div>
  <p>decrypting emotions...</p>
  <p>loading memories...</p>
</div>

<!-- SECRET ADMIN MODE -->
<input id="admin" style="opacity:0;position:fixed;top:0;" />

<!-- MAIN -->
<div id="site" style="display:none">

<div class="container">

<h1>LOVE OS: FINAL BOSS ❤️</h1>

<p>Find the secrets. Click everything. Some things are hidden.</p>

<!-- SECRET ZONES -->
<div class="secret-zone" onclick="adminMode()" style="top:20%;left:10%"></div>
<div class="secret-zone" onclick="easterEgg()" style="top:60%;left:70%"></div>

<div class="card" onclick="popup('You are my forever system.')">
💌 Memory Fragment 1
</div>

<div class="card" onclick="popup('We were always meant to crash into each other.')">
💖 Memory Fragment 2
</div>

<div class="card" onclick="quest()">
🧩 Love Quest (click to begin)
<p id="quest"></p>
</div>

<div class="card gallery">
<h2>📸 Memories</h2>
<img onclick="popup('Our happiest moment ❤️')" src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70"/>
<img onclick="popup('Forever starts here 💍')" src="https://images.unsplash.com/photo-1523438097201-512ae7d59c2a"/>
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<p id="text"></p>
<button onclick="closePopup()">close</button>
</div>

<script>

/* INTRO */
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("site").style.display="block";
},2500);

/* HEARTS */
document.addEventListener("click",(e)=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
});

/* POPUP */
function popup(t){
  document.getElementById("text").innerText=t;
  document.getElementById("popup").style.display="block";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* QUEST GAME */
let step=0;
function quest(){
  const q=document.getElementById("quest");
  const messages=[
    "Step 1: You found me ❤️",
    "Step 2: I was always yours",
    "Step 3: Look closer at the page...",
    "FINAL: You are my home."
  ];
  q.innerText=messages[step];
  step++;
  if(step>=messages.length) step=0;
}

/* EASTER EGG */
function easterEgg(){
  popup("You found a hidden love signal 💓");
}

/* ADMIN MODE */
function adminMode(){
  const val=prompt("enter admin code:");
  if(val==="foreverlove"){
    popup("ADMIN MODE UNLOCKED: I love you beyond timelines ❤️");
  } else {
    popup("access denied.");
  }
}

</script>

</body>
</html>
