TEST VERSION LOADED
</h1><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Love OS ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
  background: #050816;
}

/* 🌌 SMOOTH ANIMATED BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0b1023, #111827);
  background-size: 400% 400%;
  animation: moveBG 15s ease infinite;
  z-index: -1;
}

@keyframes moveBG {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

/* floating particles */
.dot {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(236,72,153,0.5);
  border-radius: 50%;
  animation: float 12s linear forwards;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 🔐 LOCK SCREEN */
#lock {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  backdrop-filter: blur(10px);
  text-align: center;
  padding: 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  width: 220px;
  text-align: center;
}

/* MAIN */
.container {
  width: min(1000px, 90%);
  margin: auto;
  padding: 50px 0;
}

/* ✨ CARDS (much smoother + modern) */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
  padding: 20px;
  margin: 15px 0;
  cursor: pointer;
  transition: all 0.25s ease;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 30px rgba(236,72,153,0.35);
}

/* subtle shine */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: 0.5s;
}

.card:hover::before {
  left: 120%;
}

/* BUTTON */
button {
  background: linear-gradient(90deg, #f472b6, #22d3ee);
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0f172a;
  border: 2px solid #f472b6;
  padding: 20px;
  border-radius: 15px;
  display: none;
  z-index: 10000;
  width: 280px;
  text-align: center;
}

/* smoother text */
h1 {
  text-align: center;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🔐 LOCK SCREEN -->
<div id="lock">
  <h2>💖 LOVE SYSTEM LOCKED</h2>
  <p>Hint: say the words that started it all</p>
  <input id="pass" placeholder="password"/>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- MAIN -->
<div id="site" style="display:none">

<div class="container">

<h1>To My Favorite Human ❤️</h1>

<div class="card" onclick="popup('You are my safest place.')">
💌 Memory: You + Me
</div>

<div class="card" onclick="popup('I would choose you in every timeline.')">
💖 Memory: Always You
</div>

<div class="card" onclick="popup('You are my home, no matter where we are.')">
🏡 Memory: Home
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<p id="text"></p>
<button onclick="closePopup()">close</button>
</div>

<script>

/* LOCK */
function unlock(){
  const val = document.getElementById("pass").value.toLowerCase().trim();

  if(val === "i love you"){
    document.getElementById("lock").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    alert("try again ❤️ (hint: 3 words)");
  }
}

/* POPUP */
function popup(t){
  document.getElementById("text").innerText = t;
  document.getElementById("popup").style.display = "block";
}
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* FLOATING DOTS (SMOOTHER) */
setInterval(() => {
  const d = document.createElement("div");
  d.className = "dot";
  d.style.left = Math.random() * 100 + "vw";
  d.style.animationDuration = (8 + Math.random() * 5) + "s";
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 12000);
}, 400);

</script>

</body>
</html>
